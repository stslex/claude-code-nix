name: Update Claude Code

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Pin to a specific version (leave empty for latest stable)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: update-claude-code
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Verify jq is available
        run: jq --version

      - name: Save old version
        run: |
          OLD=$(jq -r .version pkgs/claude-code/version.json)
          echo "OLD=$OLD" >> "$GITHUB_ENV"

      - name: Run update script
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            ./scripts/update.sh "${{ inputs.version }}"
          else
            ./scripts/update.sh
          fi

      - name: Save new version
        run: |
          NEW=$(jq -r .version pkgs/claude-code/version.json)
          echo "NEW=$NEW" >> "$GITHUB_ENV"

      - name: Build and verify
        if: env.OLD != env.NEW
        run: |
          nix build .#claude-code
          ACTUAL=$(./result/bin/claude --version)
          echo "Built version: $ACTUAL"
          if [[ "$ACTUAL" != *"$NEW"* ]]; then
            echo "::error::Version mismatch: expected $NEW, got $ACTUAL"
            exit 1
          fi

      - name: Commit and push
        if: env.OLD != env.NEW
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pkgs/claude-code/version.json
          git commit -m "claude-code: $OLD → $NEW"
          git push
